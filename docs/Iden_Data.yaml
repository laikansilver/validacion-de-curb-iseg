          example: "Juan"
          description: Name or Names
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Za-z àèìòùÀÈÌÒÙáéíóúýÁÉÍÓÚÝâêîôûÂÊÎÔÛãñõÃÑÕäëïöüÿÄËÏÖÜŸçÇßØøÅåÆæœ& 0-9]{1,100}$'
          example: "Pruebas"
          description: Last name
        secondLastName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Za-z àèìòùÀÈÌÒÙáéíóúýÁÉÍÓÚÝâêîôûÂÊÎÔÛãñõÃÑÕäëïöüÿÄËÏÖÜŸçÇßØøÅåÆæœ& 0-9]{1,100}$'
          example: "Pruebas"
          description: Second last name
        curp:
          type: string
          minLength: 18
