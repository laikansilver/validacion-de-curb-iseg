components:
  parameters:
    signatureHeader:
      name: x-signature
      in: header
      required: true
      description: >
        The signature (X-Signature) for POST is generated using your private key
        (SHA256withECDSA - secp384r) by signing the exact UTF-8 JSON request body (payload).
        The API Hub verifies the X-Signature using your public key, which must be registered
        in the applications section of the API Hub portal.
      schema: { type: string }
      
    apiKeyHeader:
      name: x-api-key
      in: header
      required: true
      description: The Consumer Key assigned to the application you have registered in API Hub.
      schema: { type: string }

    usernameHeader:
      name: username
      in: header
      required: true
      description: Username of the inquiry user.
      schema: { type: string }

    passwordHeader:
      name: password
      in: header
      required: true
      description: Password of the inquiry user.
      schema: { type: string }

  schemas:
    
    VerifyCedulaGetResponse:
      type: object
      properties:
        dateTime:
          type: string
          format: date-time
          example: 2020-04-12T22:20:50.52Z
          description: Date and time of the acknowledge. As defined by date-time - RFC3339.
        operation:
          type: string
          example: consumption
          description: Cedula Verification operation.
          enum: [request, consumption]
        message: 
          type: string
          readOnly: true
          example: The cedula verification request has been received.
          description: Descriptive and human-readable message.
        result:
          $ref: '#/components/schemas/ResultCedula'
    
    ResultCedula:
      type: object
      properties:
        reasonProcess:
          $ref: '#/components/schemas/ReasonProcess'
        request:
          $ref: '#/components/schemas/CedulaValidatorGet'
        cedulaData:
          $ref: '#/components/schemas/CedulaData'
        
    ReasonProcess:
      type: object
      properties:
        code:
          type: string
          example: 404.1
        message:
          type: string
          example: Not found cedula.

    CedulaData:
      type: object
      properties:
        curp:
          type: string
          example: SSSS010101SSSSXXXX
        names:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pruebas
        secondLastName:
          type: string
          example: Pruebas
        gender:
          type: string
          example: H
        birthDate:
          type: string
          example: 03/06/1990
        birthPlace:
          type: string
          example: MEXICO
        cedulas:
          type: array
          items:
            $ref: '#/components/schemas/Cedulas'
    
    Cedulas:
      type: object
      properties:
        cedula:
          type: string
          example: '00011479'
        institution:
          type: string
          example: patito
        careersDegrees:
          type: string
          example: medico cirujano

    IdentityCedulaValidationResponse:
      type: object
      required: [results]
      properties:
        dateTime:
          type: string
          format: date-time
          example: 2020-04-12T22:20:50.52Z
          description: Date and time of the acknowledge. As defined by date-time - RFC3339.
        operation:
          type: string
          example: request
          enum: [request, consumption]
          description: Cedula verification operation.
        message:
          type: string
          example: The cedula verification request has been received.
          description: Descriptive and human-readable message.
        externalId:
          type: string
          example: 391d151f-1cac-44e7-a05b-79a1199621d6
          description: The identifier of the bank account validator request given by the API consumer (UUID).
        subscriptionId:
          type: string
          example: 7c8a0230-36e0-43f4-9b7a-581dc55ea9c3
          description: The API Hub event subscription identifier (UUID).
        inquiryId:
          type: string
          example: 391d151f-1cac-44e7-a05b-79a1199621d6
          description: The account validator process identifier given by Círculo de Crédito. 
    standardEnvelope:
      type: object
      required: [code, message, dateTime, externalId, data]
      properties:
        code:
          type: string
          example: "200"
        message:
          type: string
          example: Success
        dateTime:
          type: string
          format: date-time
          example: "2025-10-09T16:30:15Z"
        externalId:
          type: string
          format: uuid
          description: Client-provided id used for tracing and correlation.
          example: "002af621-997a-4b1c-8557-c4ae0ccb3041"
        data:
          type: object
          additionalProperties: false

    errorItem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Error code (e.g., 403.1)
          example: "403.1"
        message:
          type: string
          description: Human-readable error message
          example: "We could not verify the signature, x-signature is invalid"

    errorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/errorItem'

    consolidatedResultsData:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/sourceResult'

    sourceResult:
      type: object
      required: [source, status, data, additionalInfo]
      properties:
        source:
          type: string
          description: Data source/provider
          enum: [RENAPO, INE, SEP]
        status:
          type: string
          enum: [SUCCESS, NOT_FOUND, ERROR, PENDING, PARTIAL]
        data:
          type: object
          description: Provider-specific payload (returned verbatim from the vendor)
        additionalInfo:
          type: object
          description: Additional information such as reference identifiers
          properties:
            referenceId:
              type: string
              example: "EXT-12345"

    identityValidationRequest:
      type: object
      required: [externalId]
      properties:
        externalId:
          type: string
          format: uuid
          description: Client-provided id used for tracing and correlation.
        renapoQuery:
          $ref: '#/components/schemas/renapoQuery'
        ineQuery:
          $ref: '#/components/schemas/ineQuery'
        sepQuery:
          $ref: '#/components/schemas/sepQuery'
          
    IdentityCedulaValidationRequest:
      type: object
      required: [cedulaValidator]
      properties:
        cedulaValidator:
          $ref: '#/components/schemas/CedulaValidator'
          
