  /cedula/{inquiryId}:
    get:
      tags:
        - Verify cedula
      summary: Get result verify cedula
      description: '<p>Returns the Verify cedula process payload associated with the inquiry. The inquiry is identified by the <samp>{inquiryId}</samp> path parameter.</p><table border="1" style="width:100%"><thead><tr><th>Code</th><th>Reason Process</th></tr></thead><tbody><tr><td>404.1</td><td>Not found cedula.</td></tr><tr><td>503.1</td><td>Service temporarily unavailable, please try again later.</td></tr></tbody></table>'
      operationId: getVerifyCedula
      parameters:
        - name: x-api-key
          in: header
          description: The Consumer Key assigned to the application you have registered
            in API Hub.
          required: true
          schema:
           type: string
        - name: username
          in: header
          description: Username of the inquiry user.
          required: true
          schema:
           type: string
        - name: password
          in: header
          description: Password of the inquiry user.
          required: true
          schema:
           type: string
        - name: x-signature
          in: header
          description: Signature created with your private key (SHA256withECDSA - secp384r).
            API Hub verifies the signature matches with the URL using your public key.
            Your public key must be uploaded in the API Hub Portal Applications section.
          required: true
          schema:
           type: string
        - name: inquiryId
          in: path
          description: The identifier of the inquiry.
          required: true
          schema:
           type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyCedulaGetResponse'
              examples:
                get_cedula_validator_by_curp:
                  summary: GET Cedula Validator
                  value:
                    dateTime: "2020-04-12T22:20:50.52Z"
                    operation: "consumption"
                    message: "The cedula verification request has been received."
                    result:
                      request:
                        externalId: "391d151f-1cac-44e7-a05b-79a1199621d6"
                        suscriptionId: "7c8a0230-36e0-43f4-9b7a-581dс55eа9сЗ"
                        name: "[NAME]"
                        lastName: "[LAST_NAME]"
                        secondLastName: "[SECOND_LAST_NAME]"
                        curp: "SSSS010101SSSSXXXX"
                      cedulaData:
                        curp: "SSSS010101SSSSXXXX"
                        names: "[NAMES]"
                        lastName: "[LAST_NAME]"
                        secondLastName: "[SECOND_LAST_NAME"
                        gender: "[GENDER]"
                        birthDate: "[DD/MM/YYYY]"
                        birthPlace: "MEXICO"
                        cedulas: 
                            - cedula: "12345678"
                              institucion: "[INSTITUCION]"
                              careersDegress: "[CARERRS_DEGRESS]"
                            - cedula: "12345678"
                              institucion: "[INSTITUCION]"
                              careersDegress: "[CARERRS_DEGRESS]"
                get_cedula_validator_by_curp_404:
                  summary: GET Cedula Validator 404.1
                  value:
                    dateTime: "2020-04-12T22:20:50.52Z"
                    operation: "consumption"
                    message: "The cedula verification request has been received."
                    result:
                      reasonProcess:
                        code: "404.1"
                        message: "Not found cedula"
                      request:
                        externalId: "391d151f-1cac-44e7-a05b-79a1199621d6"
                        suscriptionId: "7c8a0230-36e0-43f4-9b7a-581dс55eа9сЗ"
                        name: "[NAME]"
                        lastName: "[LAST_NAME]"
                        secondLastName: "[SECOND_LAST_NAME]"
                        curp: "SSSS010101SSSSXXXX"
                get_cedula_validator_by_curp_503:
                  summary: GET Cedula Validator 503.1
