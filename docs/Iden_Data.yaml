                    message: Success
                    dateTime: "2025-10-09T16:30:15Z"
                    externalId: "f0f0f0f0-1111-2222-3333-444444444444"
                    data:
                      results:
                        - source: RENAPO
                          status: SUCCESS
                          data:
                            codigoRespuesta: "00"
