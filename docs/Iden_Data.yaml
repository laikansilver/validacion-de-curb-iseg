openapi: 3.0.1
info:
  title: Identity Data
  description: <p>El API de Identity data permite consultar y validar información de CURP, INE y Cédula Profesional a través de distintas fuentes oficiales y confiables.
    Este servicio integra de manera segura múltiples fuentes de información, incluyendo:</p>
    <ul><li>RENAPO (Registro Nacional de Población) para validación de CURP.</li><li>INE (Instituto Nacional Electoral) para validación de los principales datos de la credencial para votar.</li><li>Diversas fuentes de datos oficiales y confiables  para validación de cédulas profesionales.</li><li>Plataformas de datos abiertos del Gobierno de México y otras bases de datos complementarias.</li></ul><p>El API está diseñado para facilitar la validación de identidad digital, prevención de fraudes y cumplimiento normativo (KYC).</p><br/>
  termsOfService: https://developer.circulodecredito.com.mx/legal-mx
  contact:
    email: api@circulodecredito.com.mx
  license:
    name: Derechos reservados Circulo de Crédito 2025
    url: http://www.circulodecredito.com.mx
  version: "1.0"

servers:
  - url: https://services.circulodecredito.com.mx/identity-data/v1

tags:
  - name: IdentityData
    description: Direct identity queries (RENAPO / INE / SEP / and more) via request payload.
  

paths:
  /queries:
    post:
      tags: [IdentityData]
      operationId: create_validation
      summary: Query identity data from multiple providers in a single request
      description: >
        Executes identity validations against one or more providers (RENAPO, INE, SEP, and more)
        using a single request. If the payload includes fields for multiple providers,
        the API returns **partial results** per provider.
      parameters:
        - $ref: '#/components/parameters/signatureHeader'
        - $ref: '#/components/parameters/apiKeyHeader'
        - $ref: '#/components/parameters/usernameHeader'
        - $ref: '#/components/parameters/passwordHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identityValidationRequest'
            examples:
              renapo_by_curp_only:
                summary: RENAPO query by CURP only
                value:
                  externalId: "002af621-997a-4b1c-8557-c4ae0ccb3041"
                  renapoQuery:
                    curp: "SSSS010101SSSSXXXX"
              renapo_by_personal_data_only:
                summary: RENAPO query by personal data only
                value:
                  externalId: "b1d6a9d0-4d1e-4ef8-9a5f-1c5d34f0d7a9"
                  renapoQuery:
                    personalData:
                      paternalSurname: "[PATERNAL_SURNAME]"
                      maternalSurname: "[MATERNAL_SURNAME]"
                      firstName: "[FIRST_NAME]"
                      sex: "[H/M]"
                      dateOfBirth: "[DD/MM/YYYY]"
                      subdivision: "MN"
              ine_only:
                summary: INE query only
                value:
                  externalId: "b1d6a9d0-4d1e-4ef8-9a5f-1c5d34f0d7a9"
                  ineQuery:
                    cic: "[CIC]"
                    ocr: "[OCR]"
                    electorKey: "[ELECTOR_KEY]"
                    issuingNumber: "03"
                    registrationYear: 2010
              renapo_and_ine:
                summary: RENAPO (CURP) + INE in the same request
                value:
                  externalId: "b1d6a9d0-4d1e-4ef8-9a5f-1c5d34f0d7a9"
                  renapoQuery:
                    curp: "SSSS010101SSSSXXXX"
                  ineQuery:
                    cic: "[CIC]"
                    ocr: "[OCR]"
                    electorKey: "[ELECTOR_KEY]"
                    issuingNumber: "03"
                    registrationYear: 2010
              sep_only:
                summary: SEP query by degree number
                value:
                  externalId: "b1d6a9d0-4d1e-4ef8-9a5f-1c5d34f0d7a9"
                  sepQuery:
                    degreeNumber: "[DEGREE_NUMBER]"
      responses:
        '200':
          description: Consolidated validation results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/standardEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/consolidatedResultsData'
              examples:
                renapo_success:
                  summary: RENAPO success
                  value:
                    code: "200"
                    message: Success
                    dateTime: "2025-10-09T16:30:15Z"
                    externalId: "f0f0f0f0-1111-2222-3333-444444444444"
                    data:
                      results:
                        - source: RENAPO
                          status: SUCCESS
                          data:
                            codigoRespuesta: "00"
                            descripcionRespuesta: "TRANSACCION EXITOSA"
                            referencia: "123456574"
                            respuestaRENAPO:
                              CURPStatus:
                                statusOper: "EXITOSO"
                                message: "LA OPERACION SE EJECUTO."
                                sessionID: "gcM-3ASUtoe0p0xxdRZuGFtaHZp1qfevfAyu89wrY..."
                                resultCURPS:
                                  CURP: "SSSS010101SSSSXXXX"
                                  apellidoPaterno: "[APELLIDO_PATERNO]"
                                  apellidoMaterno: "[APELLIDO_MATERNO]"
                                  nombres: "[NOMBRES]"
                                  sexo: "[H/M]"
                                  fechNac: "[DD/MM/YYYY]"
                                  nacionalidad: "MEX"
                                  docProbatorio: "1"
                                  anioReg: "1991"
                                  numActa: "01693"
                                  numEntidadReg: "16"
                                  cveMunicipioReg: "052"
                                  cveEntidadNac: "MN"
                                  statusCurp: "RCN"
                          additionalInfo:
                            referenceId: "ABC-12345"
                ine_success:
                  summary: INE success
                  value:
                    code: "200"
                    message: Success
                    dateTime: "2025-10-09T16:30:15Z"
                    externalId: "f0f0f0f0-1111-2222-3333-444444444444"
                    data:
                      results:
                        - source: INE
                          status: SUCCESS
                          data:
                            estatus: "OK"
                            mensaje: "Esta vigente como medio de identificacion y puede votar"
                            codigoValidacion: "vi1648070031.2717297"
                            claveMensaje: "3"
                            claveElector: "QWERTY12345678M001"
                            numeroEmision: "4"
                            anioRegistro: "2010"
                            anioEmision: "2017"
                            vigencia: "31 de diciembre de 2027"
                            ocr: "1234567890020"
                            cic: "123456789"
                            distritoFederal: "11"
