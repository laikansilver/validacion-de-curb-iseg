    renapoQuery:
      type: object
      properties:
        curp:
          type: string
          description: Unique Population Registry Code (CURP).
          pattern: '^[A-Z]{4}\d{6}[A-Z]{6}[A-Z0-9]\d$'
          example: "SSSS010101SSSSXXXX"
        personalData:
          type: object
          properties:
            paternalSurname:
              type: string
              description: Paternal Surname of the subject.
              example: "Pruebas"
            maternalSurname:
              type: string
              description: Maternal Surname of the subject.
              example: "Pruebas"
            firstName:
              type: string
              description: First name of the subject.
              example: "Juan"
            sex:
              type: string
              description: Gender (H - Male, M - Female).
              enum: [H, M]
              example: "H"
            dateOfBirth:
              type: string
              description: Date of Birth in YYYY-MM-DD format only.
              pattern: '^\d{4}-\d{2}-\d{2}$'
              example: "01/01/2010"
            subdivision:
              type: string
              description: >
                Added in request without CURP. City subdivision/state code as it appears on the ID.
                Only catalog **code** is accepted (e.g., AS).
