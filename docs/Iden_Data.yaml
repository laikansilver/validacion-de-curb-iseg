                  - CHIHUAHUA (CH)
                  - SAN LUIS POTOSI (SP)
                  - DISTRITO FEDERAL (DF)
                  - SINALOA (SL)
                  - DURANGO (DG)
                  - SONORA (SR)
                  - GUANAJUATO (GT)
                  - TABASCO (TC)
                  - GUERRERO (GR)
                  - TAMAULIPAS (TS)
                  - HIDALGO (HG)
                  - TLAXCALA (TL)
                  - JALISCO (JC)
                  - VERACRUZ (VZ)
                  - MÉXICO (MC)
                  - YUCATÁN (YN)
                  - MICHOACÁN (MN)
                  - ZACATECAS (ZS)
                  - NACIDO EN EL EXTRANJERO (NE)
              enum:
                - AS - BC - BS - MS - NT - NL - CC - OC - CL - PL - CM - QT - CS - QR - CH - SP - DF - SL - DG - SR - GT - TC - GR - TS - HG - TL - JC - VZ - MC - YN - MN - ZS - NE
              example: "MN"
          additionalProperties: false

    ineQuery:
      type: object
      properties:
        cic:
          type: string
          description: CIC number of the INE credential.
          example: "123456789"
        ocr:
          type: string
          description: OCR number of the INE credential (for card types C–F).
          example: "1234567891234"
        electorKey:
          type: string
          description: Elector key (Clave de Elector).
          example: "SSSSSS99999999S000"
        issuingNumber:
          type: string
          description: Issue number (Número de emisión).
          example: "03"
        registrationYear:
          type: integer
          description: Year of registration on the INE credential.
          example: 2009

    sepQuery:
      type: object
      properties:
        degreeNumber:
          type: string
          description: 7 or 8 digits of the SEP professional identification number.
          pattern: '^\d{7,8}$'
          example: "12345678"
            
            
            